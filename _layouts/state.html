---
layout: default
---
<h1>{{ page.title }}</h1>
<div id="map" style="height: 500px;"></div>

<div class="main-content">
    {{ content }}
</div>

<script>
    // 確保 Leaflet 載入後才執行
    window.addEventListener('load', function() {
        const map = L.map('map').setView([51.1657, 10.4515], 6);
        const baseUrl = "{{ site.baseurl }}";
        const targetState = "{{ page.geojson_name }}";

        // 載入底圖（避免只有線條沒有背景）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        fetch(`${baseUrl}/assets/germany.geojson`)
            .then(res => res.json())
            .then(data => {
                const stateLayer = L.geoJSON(data, {
                    filter: (feature) => feature.properties.name === targetState,
                    style: { color: "#ff7800", weight: 3, fillOpacity: 0.1 }
                }).addTo(map);

                if (stateLayer.getBounds().isValid()) {
                    map.fitBounds(stateLayer.getBounds(), { padding: [30, 30] });
                }
            });

        const cities = {{ page.cities | jsonify }};
        if (cities) {
            cities.forEach(city => {
                L.marker([city.lat, city.lng])
                    .addTo(map)
                    .bindPopup(`<b>${city.name}</b><br><a href="${baseUrl}${city.url}">查看景點介紹</a>`);
            });
        }
    });
</script>
