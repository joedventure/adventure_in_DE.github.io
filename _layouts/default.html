<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>{{ page.title }} | {{ site.title }}</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; background: #f8f9fa; border-radius: 8px; }
        .home-btn { position: absolute; top: 10px; left: 50px; z-index: 1000; background: white; padding: 8px 12px; border-radius: 4px; text-decoration: none; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .ad-space { margin: 20px 0; background: #eee; text-align: center; padding: 10px; min-height: 90px; }
    </style>
</head>
<body>

    <div style="position: relative;">
        {% if page.url != "/" %}
        <a href="{{ site.baseurl }}/" class="home-btn">🏠 返回德國地圖首頁</a>
        {% endif %}
        <div id="map"></div>
    </div>

    <div class="content">
        {{ content }}
    </div>

    <div class="ad-space">
        <p>廣告贊助商</p>
        </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const map = L.map('map').setView([51.1657, 10.4515], 6);
        const baseUrl = "{{ site.baseurl }}";

        // 1. 全德地圖模式 (GeoJSON 邦界點擊跳轉)
        {% if page.map_type == "germany" %}
        fetch(`${baseUrl}/assets/germany_states.json`)
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: { color: "#3388ff", weight: 2, fillOpacity: 0.1 },
                    onEachFeature: (feature, layer) => {
                        layer.on('click', () => {
                            // 假設 GeoJSON 內有 id 或 name 屬性對應 URL
                            window.location.href = `${baseUrl}/${feature.properties.id}/`;
                        });
                        layer.bindTooltip(feature.properties.name);
                    }
                }).addTo(map);
            });

        // 2. 邦頁面模式 (顯示城市標籤)
        {% elsif page.map_type == "state" %}
        const cities = {{ page.cities | jsonify }};
        cities.forEach(city => {
            L.marker([city.lat, city.lng])
                .addTo(map)
                .bindPopup(`<b>${city.name}</b><br><a href="${baseUrl}${city.url}">閱讀介紹文章</a>`);
        });
        // 自動聚焦到該邦中心 (此處簡化處理)
        if (cities.length > 0) map.setView([cities[0].lat, cities[0].lng], 8);
        {% endif %}
    </script>
</body>
</html>
